name: "Build"

on:
  push:
    branches: main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: "Check out repository"
        uses: actions/checkout@v7
      - name: "Set up Node"
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: "Install dependencies"
        run: npm ci
      - name: "Check contrast"
        run: npm run check-contrast
      - name: "Build"
        run: npm run build